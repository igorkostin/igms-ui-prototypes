<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hero04-refold — animated color rails (iGMS hero accent)</title>
  <link rel="stylesheet" href="../shared/proto-nav.css" />
  <link rel="stylesheet" href="../shared/design-tokens.css" />
  <link rel="stylesheet" href="../shared/hero-base.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="proto-nav">
    <a href="../">hub</a>
    <a href="../dot-ring/">dot-ring</a>
    <a href="../hero01-copperx/">copperx waves</a>
    <a href="../hero02-castle/">castle blobs</a>
    <a href="../hero03-trunk/">trunk mountains</a>
    <a class="active" href="./">refold rails</a>
  </nav>

  <section class="hero">
    <div id="rail-left"  class="rail rail-left"></div>
    <div id="rail-right" class="rail rail-right"></div>

    <div class="hero-inner">
      <div class="rating">
        <span class="rating-icons">★★★★★</span>
        <span class="rating-text">1,300+ reviews</span>
      </div>

      <h1>Short-term rental software for hosts growing beyond <span class="brand">Airbnb</span></h1>

      <p class="lede">
        Connect Airbnb, VRBO, and Booking.com in one app. Easy to set up
        and if you get stuck, a real person helps.
      </p>

      <div class="cta-row">
        <button class="btn btn-primary">Start free trial</button>
        <button class="btn btn-secondary">Book a demo</button>
      </div>

      <img
        class="product-image"
        src="../shared/igms-main-multicalendar-screen.png"
        alt="iGMS multi-calendar dashboard"
        loading="eager"
        decoding="async"
      />
    </div>
  </section>

  <aside class="controls">
    <h3>Refold rails — controls</h3>
    <div class="grid">
      <label>
        Bar count <span class="val" id="val-count">60</span>
        <input id="barCount" type="range" min="12" max="160" step="1" value="60" />
      </label>
      <label>
        Bar height <span class="val" id="val-bh">24 px</span>
        <input id="barHeight" type="range" min="8" max="60" step="1" value="24" />
      </label>
      <label>
        Min width <span class="val" id="val-mn">25 %</span>
        <input id="minWidth" type="range" min="0" max="80" step="1" value="25" />
      </label>
      <label>
        Max width <span class="val" id="val-mx">95 %</span>
        <input id="maxWidth" type="range" min="30" max="100" step="1" value="95" />
      </label>
      <label>
        Breathe duration <span class="val" id="val-anim">5.0 s</span>
        <input id="animSeconds" type="range" min="1" max="15" step="0.2" value="5" />
      </label>
      <label>
        Stagger <span class="val" id="val-stag">0.10 s</span>
        <input id="staggerSeconds" type="range" min="0" max="0.6" step="0.01" value="0.10" />
      </label>
      <label class="palette-label">
        Palette  (outer → brand inside)
        <div class="preset-row" id="palette-row">
          <button data-palette="yellow-blue" class="active">blue → yellow</button>
          <button data-palette="yellow-green">green → yellow</button>
          <button data-palette="yellow-coral">coral → yellow</button>
          <button data-palette="yellow-mono">olive → yellow</button>
          <button data-palette="yellow-purple">purple → yellow</button>
          <button data-palette="blue-mono">blue (A/B, no yellow)</button>
        </div>
      </label>
    </div>
  </aside>

  <script type="module">
    import { ColorRails, RAIL_PALETTES } from "./bars.js";

    const left  = document.getElementById("rail-left");
    const right = document.getElementById("rail-right");
    const rails = new ColorRails([left, right]);

    const $ = (id) => document.getElementById(id);

    const wireSlider = (id, key, valId, fmt) => {
      $(id).addEventListener("input", (e) => {
        const v = Number(e.target.value);
        rails.update({ [key]: v });
        $(valId).textContent = fmt(v);
      });
    };
    wireSlider("barCount",       "barCount",       "val-count", (v) => `${v}`);
    wireSlider("barHeight",      "barHeight",      "val-bh",    (v) => `${v} px`);
    wireSlider("minWidth",       "minWidth",       "val-mn",    (v) => `${v} %`);
    wireSlider("maxWidth",       "maxWidth",       "val-mx",    (v) => `${v} %`);
    wireSlider("animSeconds",    "animSeconds",    "val-anim",  (v) => `${v.toFixed(1)} s`);
    wireSlider("staggerSeconds", "staggerSeconds", "val-stag",  (v) => `${v.toFixed(2)} s`);

    document.querySelectorAll("[data-palette]").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll("[data-palette]").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        rails.update({ palette: b.dataset.palette });
      });
    });
  </script>
</body>
</html>
