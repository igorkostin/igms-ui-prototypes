<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hero03-trunk — sketch mountains (iGMS hero accent)</title>
  <link rel="stylesheet" href="../shared/proto-nav.css" />
  <link rel="stylesheet" href="../shared/design-tokens.css" />
  <link rel="stylesheet" href="../shared/hero-base.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="proto-nav">
    <a href="../">hub</a>
    <a href="../dot-ring/">dot-ring</a>
    <a href="../hero01-copperx/">copperx waves</a>
    <a href="../hero02-castle/">castle blobs</a>
    <a class="active" href="./">trunk mountains</a>
    <a href="../hero05-castle/">castle wash</a>
    <a href="../hero06-glean/">glean mesh</a>
  </nav>

  <section class="hero">
    <!-- Sketch mountains — inverted, mask-faded into the hero white. -->
    <img
      class="mountains"
      src="../shared/sketch-mountains.jpg"
      alt=""
      aria-hidden="true"
      loading="eager"
      decoding="async"
    />

    <div class="hero-inner">
      <div class="rating">
        <span class="rating-icons">★★★★★</span>
        <span class="rating-text">1,300+ reviews</span>
      </div>

      <h1>Short-term rental software for hosts growing beyond <span class="brand">Airbnb</span></h1>

      <p class="lede">
        Connect Airbnb, VRBO, and Booking.com in one app. Easy to set up
        and if you get stuck, a real person helps.
      </p>

      <div class="cta-row">
        <button class="btn btn-primary">Start free trial</button>
        <button class="btn btn-secondary">Book a demo</button>
      </div>

      <img
        class="product-image"
        src="../shared/igms-main-multicalendar-screen.png"
        alt="iGMS multi-calendar dashboard"
        loading="eager"
        decoding="async"
      />
    </div>
  </section>

  <aside class="controls">
    <h3>Trunk mountains — controls</h3>
    <div class="grid">
      <label>
        Vertical offset (top) <span class="val" id="val-top">150 px</span>
        <input id="top" type="range" min="-400" max="900" step="5" value="150" />
      </label>
      <label>
        Height <span class="val" id="val-height">810 px</span>
        <input id="height" type="range" min="200" max="1400" step="10" value="810" />
      </label>
      <label>
        Opacity <span class="val" id="val-opacity">0.50</span>
        <input id="opacity" type="range" min="0" max="1" step="0.05" value="0.50" />
      </label>
      <div class="btn-row">
        <button data-preset="igms-1" class="active">iGMS-1 (default)</button>
        <button data-preset="igms-2">iGMS-2</button>
        <button data-preset="top">top of hero</button>
        <button data-preset="below-cta">below CTA</button>
        <button data-preset="peek">above title (peek)</button>
        <button data-preset="under-image">under product image</button>
      </div>
    </div>
  </aside>

  <script>
    const root = document.documentElement;
    const $ = (id) => document.getElementById(id);

    function set(varName, val, label, fmt) {
      root.style.setProperty(varName, val);
      if (label) $(label).textContent = fmt(val);
    }

    $("top").addEventListener("input", (e) => {
      const v = Number(e.target.value);
      root.style.setProperty("--mountains-top", `${v}px`);
      $("val-top").textContent = `${v} px`;
    });
    $("height").addEventListener("input", (e) => {
      const v = Number(e.target.value);
      root.style.setProperty("--mountains-height", `${v}px`);
      $("val-height").textContent = `${v} px`;
    });
    $("opacity").addEventListener("input", (e) => {
      const v = Number(e.target.value);
      root.style.setProperty("--mountains-opacity", v);
      $("val-opacity").textContent = v.toFixed(2);
    });

    // Saved presets. iGMS-1 is the canonical default applied on page load.
    const PRESETS = {
      "igms-1":       { top: 150, height: 810, opacity: 0.50 },   // Igor's default
      "igms-2":       { top: 245, height: 810, opacity: 0.75 },   // Igor's alt
      "top":          { top:   0, height: 720, opacity: 0.85 },
      "below-cta":    { top: 320, height: 600, opacity: 0.75 },
      "peek":         { top:-120, height: 500, opacity: 0.70 },
      "under-image":  { top: 580, height: 500, opacity: 0.65 },
    };
    function applyPreset(name) {
      const p = PRESETS[name];
      if (!p) return;
      $("top").value = p.top;       $("top").dispatchEvent(new Event("input"));
      $("height").value = p.height; $("height").dispatchEvent(new Event("input"));
      $("opacity").value = p.opacity; $("opacity").dispatchEvent(new Event("input"));
      document.querySelectorAll("[data-preset]").forEach((x) =>
        x.classList.toggle("active", x.dataset.preset === name));
    }
    document.querySelectorAll("[data-preset]").forEach((b) => {
      b.addEventListener("click", () => applyPreset(b.dataset.preset));
    });
    // Manual slider changes drop the "active" preset state.
    ["top", "height", "opacity"].forEach((id) => {
      $(id).addEventListener("input", () => {
        document.querySelectorAll("[data-preset]").forEach((x) =>
          x.classList.remove("active"));
      });
    });
  </script>
</body>
</html>
